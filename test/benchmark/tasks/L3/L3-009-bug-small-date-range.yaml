id: "L3-009"
title: "Bug small: inclusive date range"
level: "L3"
category: "bug-small"
weight: 0.8

fixture:
  project: "bug-small-date-range"

prompt: |
  修复一个简单 bug：`enumerateDays(startDate, endDate)` 应该返回包含开始和结束日期的日期数组。
  当前实现漏掉了结束日期，并且单日范围会返回空数组。
  要求：
  - 只修业务代码，不要修改测试
  - 保持输出格式为 `YYYY-MM-DD`
  - 完成后运行 `npm test`

rubric_points:
  - "修复 inclusive end 的 off-by-one"
  - "单日范围返回包含该日期的数组"
  - "未修改 tests/date-range.test.js"
  - "npm test 通过"

objective_checks:
  - command: "npm test"
    weight_into: "Correctness"
  - command: "git diff --quiet HEAD -- tests/date-range.test.js"
    weight_into: "NoRegression"
  - command: "node -e \"const {enumerateDays}=require('./src/date-range'); const r=enumerateDays('2026-07-01','2026-07-03'); if (r.join(',') !== '2026-07-01,2026-07-02,2026-07-03') process.exit(1)\""
    weight_into: "Correctness"

runtime:
  timeout_sec: 240
  runs: 3
