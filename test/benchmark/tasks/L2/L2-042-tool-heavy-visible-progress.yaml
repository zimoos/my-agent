id: "L2-042"
title: "体验红线：工具密集调查必须有可见进度"
level: "L2"
category: "ux-regression"
weight: 1.3

fixture:
  project: "simple-node-project"

behavior_expectations:
  - "连续读取多个项目文件时，不能让用户只看到工具调用而没有进度说明"
  - "进度说明必须包含最近工具名、路径或命令结果"

user_input: "分别读取 package.json、README.md、src/index.js、src/utils.js，然后用中文总结项目用途、依赖、入口文件和工具函数。"

hard_assertions:
  - type: tool_call_count_by_round
    round: 0
    min: 4
    tool: "fs__read_file"
  - type: progress_count_min
    min: 1
  - type: no_silent_tool_streak
    max: 4
  - type: final_text_contains
    contains: "react"
  - type: no_orphan_tool
  - type: no_error_5xx

soft_assertions:
  - type: llm_judge
    rubric: "是否完成了工具密集调查，并在执行中输出了具体、非空泛的进度说明"
    weight: 0.7
  - type: duration_max
    ms: 240000
    weight: 0.3

runtime:
  timeout_sec: 300
  runs: 5
  max_rounds: 1
  layer: "L2"
