id: "L2-039"
title: "图片识别：报错截图给出可执行判断"
level: "L2"
category: "vision"
weight: 0.8

fixture:
  project: "vision-ui"

requires:
  - "vision"
attachments:
  - type: "image"
    path: "assets/error-dashboard.svg"
    mime: "image/svg+xml"

behavior_expectations:
  - "应描述截图中的关键错误，而不是泛泛说看不到"
  - "建议动作必须基于截图证据"
judge_rubric:
  - "最终回答应提到 HTTP 500、npm run build 或打开 build logs"

user_input: "看这张截图，说明失败点和下一步应该怎么处理。"

hard_assertions:
  - type: final_text_contains
    regex: "500|build|logs?"
  - type: final_text_min_chars
    chars: 20
  - type: no_orphan_tool
  - type: no_error_5xx

soft_assertions:
  - type: llm_judge
    rubric: "是否正确读取截图并给出可执行处理建议"
    weight: 0.7
  - type: final_text_min_len
    chars: 40
    weight: 0.2
  - type: duration_max
    ms: 180000
    weight: 0.1

runtime:
  timeout_sec: 220
  runs: 3
  max_rounds: null
  layer: "L2"
