id: "L2-043"
title: "体验红线：任务失败必须有可执行摘要"
level: "L2"
category: "ux-regression"
weight: 1.1

fixture:
  project: "simple-node-project"

behavior_expectations:
  - "即使任务最终失败，也必须告诉用户已完成什么、失败点和下一步建议"

user_input: "读取一个不存在的目录 /definitely-not-existing-ma-benchmark-dir，并说明失败原因与下一步建议。"

hard_assertions:
  - type: task_failure_has_actionable_summary
  - type: final_text_mentions_uncertainty_or_question
  - type: no_silent_tool_streak
    max: 4
  - type: no_orphan_tool

soft_assertions:
  - type: llm_judge
    rubric: "如果工具失败，最终回答是否清楚说明失败点和下一步建议，而不是只有命令错误"
    weight: 0.8
  - type: duration_max
    ms: 180000
    weight: 0.2

runtime:
  timeout_sec: 220
  runs: 5
  max_rounds: 1
  layer: "L2"
